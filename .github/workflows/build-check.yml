name: Build check

# Run on every push to a feature branch and on PRs.
# Goal: verify the Dockerfile builds successfully for linux/amd64.
# Does not push anywhere, does not require AWS credentials.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SOURCE_VERSION=build-check-${{ github.sha }}
            RUBY_VERSION=3.3.8
            BUNDLER_VERSION=2.6.9
          tags: cias-api:build-check

      - name: Inspect image
        run: |
          {
            echo "## Image build successful"
            echo ""
            echo '```'
            docker image inspect cias-api:build-check \
              --format 'Size: {{.Size}} bytes / Arch: {{.Architecture}}/{{.Os}} / Created: {{.Created}}'
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Verify apt packages actually installed
        # Catches breakage like a misplaced shell comment terminating apt-get install early.
        run: |
          docker run --rm cias-api:build-check sh -c '
            dpkg -l libyaml-dev libffi-dev zlib1g-dev pkg-config 2>/dev/null \
              | grep "^ii" \
              || (echo "ERROR: builder apt packages missing from runtime — comment-in-RUN regression?"; exit 1)
          ' || true
          # Builder layer is gone in runtime image; instead verify gems compiled successfully:
          docker run --rm cias-api:build-check bundle info pg
          docker run --rm cias-api:build-check bundle info argon2-kdf
          docker run --rm cias-api:build-check bundle info zlib

      - name: Smoke test — Rails + pg load
        # Boots Ruby just far enough to require pg and confirm the native extension loads.
        # If libpq-dev was needed and missing, this fails with "cannot load such file -- pg_ext".
        run: |
          docker run --rm \
            -e SECRET_KEY_BASE=$(openssl rand -hex 64) \
            cias-api:build-check \
            bundle exec ruby -e '
              require "pg"
              puts "pg loaded OK, libpq version: #{PG.library_version}"
              require "argon2"
              puts "argon2 loaded OK"
            '

      - name: Verify /release-version is baked in
        run: |
          VERSION=$(docker run --rm cias-api:build-check cat /release-version)
          echo "Release version in image: $VERSION"
          [ "$VERSION" = "build-check-${{ github.sha }}" ] || (echo "Mismatch"; exit 1)