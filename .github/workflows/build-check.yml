name: Build check

# Run on every push to a feature branch and on PRs.
# Goal: verify the Dockerfile builds successfully for linux/amd64.
# Does not push anywhere, does not require AWS credentials.

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SOURCE_VERSION=build-check
            GIT_SHA=${{ github.sha }}
            RUBY_VERSION=3.3.8
            BUNDLER_VERSION=2.6.9
          tags: cias-api:build-check

      - name: Inspect image
        run: |
          {
            echo "## Image build successful"
            echo ""
            echo '```'
            docker image inspect cias-api:build-check \
              --format 'Size: {{.Size}} bytes / Arch: {{.Architecture}}/{{.Os}} / Created: {{.Created}}'
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"